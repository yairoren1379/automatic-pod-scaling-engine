apiVersion: apps/v1
kind: Deployment
metadata:
  name: yair-api-python
spec:
  replicas: 15
  selector:
    matchLabels:
      app: yair-api
  template:
    metadata:
      labels:
        app: yair-api
    spec:
      containers:
      - name: python-container
        image: debian:buster-slim
        # החזרנו אותם לישון! עומס ה-CPU יצנח ל-0
        command: ["/bin/sh", "-c", "sleep 3600"]
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"